<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>
  <!-- Central robot -->
  <rect x="205" y="110" width="90" height="70" rx="16" stroke="#E57035" stroke-width="2" fill="white"/>
  <circle cx="232" cy="140" r="8" fill="#E57035" opacity="0.8"/>
  <circle cx="268" cy="140" r="8" fill="#E57035" opacity="0.8"/>
  <path d="M232 160 q18 12 36 0" stroke="#E57035" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="250" y1="110" x2="250" y2="90" stroke="#E57035" stroke-width="2"/>
  <circle cx="250" cy="86" r="5" fill="#E57035"/>
  <!-- Task nodes -->
  <rect x="100" y="210" width="80" height="50" rx="10" fill="rgba(229,112,53,0.1)" stroke="#E57035" stroke-width="1.5"/>
  <text x="140" y="240" text-anchor="middle" font-family="system-ui" font-size="11" fill="#E57035">Email</text>
  <rect x="210" y="220" width="80" height="50" rx="10" fill="rgba(229,112,53,0.15)" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="250" text-anchor="middle" font-family="system-ui" font-size="11" fill="#E57035">Data</text>
  <rect x="320" y="210" width="80" height="50" rx="10" fill="rgba(229,112,53,0.1)" stroke="#E57035" stroke-width="1.5"/>
  <text x="360" y="240" text-anchor="middle" font-family="system-ui" font-size="11" fill="#E57035">Rapport</text>
  <!-- Connections -->
  <line x1="230" y1="180" x2="140" y2="210" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="180" x2="250" y2="220" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>
  <line x1="270" y1="180" x2="360" y2="210" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>
  <!-- Labels -->
  <text x="250" y="320" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#E57035">AI Agent</text>
  <text x="250" y="345" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Automatisering · Taken · Workflows</text>
</svg>
