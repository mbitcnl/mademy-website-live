<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="16" ry="16" fill="#FDF2ED"/>

  <!-- Documents -->
  <rect x="140" y="120" width="80" height="100" rx="4" fill="white" stroke="#E57035" stroke-width="2"/>
  <line x1="155" y1="140" x2="205" y2="140" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="155" x2="200" y2="155" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="170" x2="195" y2="170" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="185" x2="205" y2="185" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>

  <rect x="170" y="140" width="80" height="100" rx="4" fill="white" stroke="#E57035" stroke-width="2"/>
  <line x1="185" y1="160" x2="235" y2="160" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="185" y1="175" x2="230" y2="175" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="185" y1="190" x2="225" y2="190" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="185" y1="205" x2="235" y2="205" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>

  <!-- Magnifying glass -->
  <circle cx="310" cy="180" r="50" fill="none" stroke="#E57035" stroke-width="3"/>
  <circle cx="310" cy="180" r="42" fill="#E57035" fill-opacity="0.08"/>
  <line x1="345" y1="215" x2="380" y2="250" stroke="#E57035" stroke-width="4" stroke-linecap="round"/>

  <!-- Nodes connected to magnifying glass -->
  <circle cx="310" cy="180" r="6" fill="#E57035"/>

  <circle cx="380" cy="120" r="10" fill="#E57035" opacity="0.7"/>
  <line x1="345" y1="150" x2="375" y2="125" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>

  <circle cx="400" cy="170" r="8" fill="#E57035" opacity="0.5"/>
  <line x1="360" y1="178" x2="392" y2="172" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>

  <circle cx="370" cy="90" r="6" fill="#E57035" opacity="0.4"/>
  <line x1="340" y1="140" x2="366" y2="94" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>

  <circle cx="420" cy="130" r="7" fill="#E57035" opacity="0.6"/>
  <line x1="388" y1="118" x2="414" y2="128" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>

  <!-- Connection between nodes -->
  <line x1="380" y1="120" x2="400" y2="170" stroke="#E57035" stroke-width="1" opacity="0.3"/>
  <line x1="380" y1="120" x2="420" y2="130" stroke="#E57035" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="90" x2="380" y2="120" stroke="#E57035" stroke-width="1" opacity="0.3"/>

  <!-- Title -->
  <text x="250" y="330" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#E57035">Discovery Phase</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui" font-size="13" fill="#E57035" opacity="0.7">Analyse &amp; Inzichten</text>
</svg>