<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="16" ry="16" fill="#FDF2ED"/>

  <!-- Connection lines from center to boxes -->
  <line x1="250" y1="160" x2="110" y2="90" stroke="#E57035" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="160" x2="390" y2="90" stroke="#E57035" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="160" x2="110" y2="250" stroke="#E57035" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="160" x2="390" y2="250" stroke="#E57035" stroke-width="2" opacity="0.4"/>

  <!-- Central robot node -->
  <circle cx="250" cy="160" r="40" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <!-- Robot face -->
  <rect x="235" y="148" width="30" height="20" rx="4" fill="#E57035" fill-opacity="0.15"/>
  <circle cx="243" cy="156" r="3" fill="#E57035"/>
  <circle cx="257" cy="156" r="3" fill="#E57035"/>
  <line x1="240" y1="164" x2="260" y2="164" stroke="#E57035" stroke-width="1.5"/>
  <!-- Antenna -->
  <line x1="250" y1="148" x2="250" y2="136" stroke="#E57035" stroke-width="1.5"/>
  <circle cx="250" cy="133" r="3" fill="#E57035"/>

  <text x="250" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#E57035">Agent</text>

  <!-- Task box: Email (top-left) -->
  <rect x="55" y="60" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="70" y="74" width="18" height="12" rx="2" fill="#E57035" fill-opacity="0.3"/>
  <text x="95" y="93" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.6">taak</text>
  <text x="110" y="80" font-family="system-ui" font-size="13" font-weight="600" fill="#E57035">Email</text>

  <!-- Task box: Data (top-right) -->
  <rect x="335" y="60" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <circle cx="357" cy="80" r="8" fill="#E57035" fill-opacity="0.3"/>
  <text x="377" y="85" font-family="system-ui" font-size="13" font-weight="600" fill="#E57035">Data</text>
  <text x="390" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.6">taak</text>

  <!-- Task box: Report (bottom-left) -->
  <rect x="55" y="225" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="70" y="237" width="14" height="18" rx="2" fill="#E57035" fill-opacity="0.3"/>
  <text x="95" y="250" font-family="system-ui" font-size="13" font-weight="600" fill="#E57035">Report</text>
  <text x="110" y="267" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.6">taak</text>

  <!-- Task box: Support (bottom-right) -->
  <rect x="335" y="225" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <circle cx="357" cy="246" r="8" fill="#E57035" fill-opacity="0.3"/>
  <text x="377" y="250" font-family="system-ui" font-size="13" font-weight="600" fill="#E57035">Support</text>
  <text x="390" y="267" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.6">taak</text>

  <!-- Animated-style pulse rings -->
  <circle cx="250" cy="160" r="55" fill="none" stroke="#E57035" stroke-width="1" opacity="0.15"/>
  <circle cx="250" cy="160" r="70" fill="none" stroke="#E57035" stroke-width="1" opacity="0.08"/>

  <!-- Title -->
  <text x="250" y="330" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#E57035">Agent Workflow</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui" font-size="13" fill="#E57035" opacity="0.7">Automatiseer taken met AI-agents</text>
</svg>