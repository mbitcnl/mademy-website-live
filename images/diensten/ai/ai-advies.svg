<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>
  <!-- Roadmap / compass -->
  <circle cx="250" cy="170" r="70" stroke="#E57035" stroke-width="2" fill="white"/>
  <circle cx="250" cy="170" r="55" stroke="#E57035" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <!-- Compass needle -->
  <path d="M250 115 l12 55 l-12 8 l-12-8 z" fill="#E57035" opacity="0.8"/>
  <path d="M250 225 l12-55 l-12-8 l-12 8 z" fill="#E57035" opacity="0.3"/>
  <circle cx="250" cy="170" r="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <!-- Direction labels -->
  <text x="250" y="105" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#E57035">STRATEGIE</text>
  <text x="340" y="174" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">ROI</text>
  <text x="250" y="258" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">ROADMAP</text>
  <text x="163" y="174" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">RISK</text>
  <!-- Milestone dots -->
  <circle cx="130" cy="290" r="8" fill="#E57035" opacity="0.3"/>
  <circle cx="210" cy="290" r="8" fill="#E57035" opacity="0.5"/>
  <circle cx="290" cy="290" r="8" fill="#E57035" opacity="0.7"/>
  <circle cx="370" cy="290" r="8" fill="#E57035"/>
  <line x1="138" y1="290" x2="362" y2="290" stroke="#E57035" stroke-width="2" opacity="0.2"/>
  <!-- Labels -->
  <text x="250" y="330" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#E57035">AI Advies</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Strategie · Roadmap · ROI · Implementatie</text>
</svg>
