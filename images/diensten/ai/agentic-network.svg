<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="16" ry="16" fill="#FDF2ED"/>

  <!-- Interconnection lines (drawn first, behind nodes) -->
  <!-- Central to medium nodes -->
  <line x1="250" y1="170" x2="130" y2="100" stroke="#E57035" stroke-width="2" opacity="0.3"/>
  <line x1="250" y1="170" x2="380" y2="95" stroke="#E57035" stroke-width="2" opacity="0.3"/>
  <line x1="250" y1="170" x2="120" y2="240" stroke="#E57035" stroke-width="2" opacity="0.3"/>
  <line x1="250" y1="170" x2="390" y2="235" stroke="#E57035" stroke-width="2" opacity="0.3"/>

  <!-- Medium to small nodes -->
  <line x1="130" y1="100" x2="60" y2="60" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="130" y1="100" x2="70" y2="150" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="380" y1="95" x2="430" y2="50" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="380" y1="95" x2="445" y2="145" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="120" y1="240" x2="55" y2="210" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="120" y1="240" x2="80" y2="290" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="390" y1="235" x2="440" y2="200" stroke="#E57035" stroke-width="1" opacity="0.2"/>
  <line x1="390" y1="235" x2="430" y2="280" stroke="#E57035" stroke-width="1" opacity="0.2"/>

  <!-- Cross connections between medium nodes -->
  <line x1="130" y1="100" x2="380" y2="95" stroke="#E57035" stroke-width="1" opacity="0.1" stroke-dasharray="5,4"/>
  <line x1="120" y1="240" x2="390" y2="235" stroke="#E57035" stroke-width="1" opacity="0.1" stroke-dasharray="5,4"/>
  <line x1="130" y1="100" x2="120" y2="240" stroke="#E57035" stroke-width="1" opacity="0.1" stroke-dasharray="5,4"/>
  <line x1="380" y1="95" x2="390" y2="235" stroke="#E57035" stroke-width="1" opacity="0.1" stroke-dasharray="5,4"/>

  <!-- Small nodes (8) -->
  <circle cx="60" cy="60" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="70" cy="150" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="430" cy="50" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="445" cy="145" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="55" cy="210" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="80" cy="290" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="440" cy="200" r="8" fill="#E57035" opacity="0.35"/>
  <circle cx="430" cy="280" r="8" fill="#E57035" opacity="0.35"/>

  <!-- Medium nodes (4) -->
  <circle cx="130" cy="100" r="18" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="130" y="104" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="600" fill="#E57035">Plan</text>

  <circle cx="380" cy="95" r="18" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="380" y="99" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="600" fill="#E57035">Code</text>

  <circle cx="120" cy="240" r="18" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="120" y="244" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="600" fill="#E57035">Test</text>

  <circle cx="390" cy="235" r="18" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="390" y="239" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="600" fill="#E57035">Deploy</text>

  <!-- Central large node -->
  <circle cx="250" cy="170" r="35" fill="white" stroke="#E57035" stroke-width="3"/>
  <circle cx="250" cy="170" r="28" fill="#E57035" fill-opacity="0.08"/>
  <text x="250" y="166" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#E57035">Orchestrator</text>
  <text x="250" y="180" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.6">Agent</text>

  <!-- Pulse rings around central -->
  <circle cx="250" cy="170" r="50" fill="none" stroke="#E57035" stroke-width="1" opacity="0.1"/>
  <circle cx="250" cy="170" r="65" fill="none" stroke="#E57035" stroke-width="1" opacity="0.06"/>

  <!-- Title -->
  <text x="250" y="340" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#E57035">Multi-Agent Netwerk</text>
  <text x="250" y="365" text-anchor="middle" font-family="system-ui" font-size="13" fill="#E57035" opacity="0.7">Samenwerkende AI-agents</text>
</svg>