<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="16" ry="16" fill="#FDF2ED"/>

  <!-- Horizontal connecting line -->
  <line x1="70" y1="180" x2="430" y2="180" stroke="#E57035" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow at end -->
  <polygon points="425,172 440,180 425,188" fill="#E57035"/>

  <!-- Milestone 1 -->
  <circle cx="100" cy="180" r="14" fill="#E57035"/>
  <circle cx="100" cy="180" r="6" fill="white"/>
  <rect x="65" y="205" width="70" height="50" rx="6" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="100" y="225" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#E57035">Analyse</text>
  <text x="100" y="242" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.7">Week 1-2</text>

  <!-- Milestone 2 -->
  <circle cx="210" cy="180" r="14" fill="#E57035" opacity="0.85"/>
  <circle cx="210" cy="180" r="6" fill="white"/>
  <rect x="175" y="110" width="70" height="50" rx="6" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="210" y="130" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#E57035">Ontwerp</text>
  <text x="210" y="147" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.7">Week 3-4</text>
  <line x1="210" y1="160" x2="210" y2="166" stroke="#E57035" stroke-width="1.5"/>

  <!-- Milestone 3 -->
  <circle cx="320" cy="180" r="14" fill="#E57035" opacity="0.7"/>
  <circle cx="320" cy="180" r="6" fill="white"/>
  <rect x="285" y="205" width="70" height="50" rx="6" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="320" y="225" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#E57035">Pilot</text>
  <text x="320" y="242" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.7">Week 5-8</text>

  <!-- Milestone 4 -->
  <circle cx="410" cy="180" r="14" fill="#E57035" opacity="0.55"/>
  <circle cx="410" cy="180" r="6" fill="white"/>
  <rect x="375" y="110" width="70" height="50" rx="6" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="410" y="130" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#E57035">Uitrol</text>
  <text x="410" y="147" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.7">Week 9-12</text>
  <line x1="410" y1="160" x2="410" y2="166" stroke="#E57035" stroke-width="1.5"/>

  <!-- Title -->
  <text x="250" y="330" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="600" fill="#E57035">AI Roadmap</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui" font-size="13" fill="#E57035" opacity="0.7">Stapsgewijs naar AI-volwassenheid</text>
</svg>