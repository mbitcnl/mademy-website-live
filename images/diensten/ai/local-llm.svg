<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>
  <!-- Server rack -->
  <rect x="180" y="100" width="140" height="180" rx="12" stroke="#E57035" stroke-width="2" fill="white"/>
  <rect x="195" y="120" width="110" height="30" rx="6" fill="rgba(229,112,53,0.1)" stroke="#E57035" stroke-width="1"/>
  <rect x="195" y="160" width="110" height="30" rx="6" fill="rgba(229,112,53,0.1)" stroke="#E57035" stroke-width="1"/>
  <rect x="195" y="200" width="110" height="30" rx="6" fill="rgba(229,112,53,0.15)" stroke="#E57035" stroke-width="1.5"/>
  <rect x="195" y="240" width="110" height="24" rx="6" fill="rgba(229,112,53,0.06)"/>
  <!-- Server LEDs -->
  <circle cx="210" cy="135" r="4" fill="#22c55e"/>
  <circle cx="225" cy="135" r="4" fill="#22c55e"/>
  <circle cx="210" cy="175" r="4" fill="#22c55e"/>
  <circle cx="225" cy="175" r="4" fill="#E57035"/>
  <circle cx="210" cy="215" r="4" fill="#E57035"/>
  <circle cx="225" cy="215" r="4" fill="#E57035"/>
  <!-- Lock icon -->
  <rect x="355" y="155" width="50" height="40" rx="8" fill="#E57035"/>
  <path d="M370 155 v-12 a10 10 0 0 1 20 0 v12" stroke="white" stroke-width="3" fill="none"/>
  <circle cx="380" cy="175" r="4" fill="white"/>
  <!-- Arrow server to lock -->
  <line x1="320" y1="180" x2="350" y2="175" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Labels -->
  <text x="250" y="320" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#E57035">Local LLM</text>
  <text x="250" y="345" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Llama · Mistral · Qwen · On-premises</text>
</svg>
