<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="40" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#E57035">Infrastructure Layers</text>

  <!-- Layer 1: Power -->
  <rect x="60" y="60" width="380" height="65" rx="10" fill="#FFF5EE" stroke="#E57035" stroke-width="2"/>
  <!-- UPS icon -->
  <rect x="80" y="72" width="30" height="40" rx="4" fill="#E57035" opacity="0.2"/>
  <text x="95" y="96" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">UPS</text>
  <!-- Generator icon -->
  <rect x="120" y="72" width="30" height="40" rx="4" fill="#E57035" opacity="0.2"/>
  <text x="135" y="96" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">GEN</text>
  <!-- Plus sign -->
  <line x1="155" y1="92" x2="165" y2="92" stroke="#E57035" stroke-width="2"/>
  <line x1="160" y1="87" x2="160" y2="97" stroke="#E57035" stroke-width="2"/>
  <!-- PDU icon -->
  <rect x="170" y="72" width="30" height="40" rx="4" fill="#E57035" opacity="0.2"/>
  <text x="185" y="96" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">PDU</text>
  <!-- Label -->
  <text x="340" y="88" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Power</text>
  <text x="340" y="104" text-anchor="middle" font-family="system-ui" font-size="10" fill="#888">Dual feed + UPS + Generator</text>

  <!-- Layer 2: Cooling -->
  <rect x="60" y="140" width="380" height="65" rx="10" fill="#FFF5EE" stroke="#E57035" stroke-width="2"/>
  <!-- Fan icon 1 -->
  <circle cx="95" cy="172" r="18" fill="#E57035" opacity="0.15"/>
  <circle cx="95" cy="172" r="6" fill="none" stroke="#E57035" stroke-width="1.5"/>
  <line x1="95" y1="160" x2="95" y2="184" stroke="#E57035" stroke-width="1.5"/>
  <line x1="83" y1="172" x2="107" y2="172" stroke="#E57035" stroke-width="1.5"/>
  <!-- Fan icon 2 (N+1) -->
  <circle cx="140" cy="172" r="18" fill="#E57035" opacity="0.15"/>
  <circle cx="140" cy="172" r="6" fill="none" stroke="#E57035" stroke-width="1.5"/>
  <line x1="140" y1="160" x2="140" y2="184" stroke="#E57035" stroke-width="1.5"/>
  <line x1="128" y1="172" x2="152" y2="172" stroke="#E57035" stroke-width="1.5"/>
  <!-- N+1 label -->
  <text x="170" y="176" font-family="system-ui" font-size="10" fill="#E57035">N+1</text>
  <!-- Label -->
  <text x="340" y="168" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Cooling</text>
  <text x="340" y="184" text-anchor="middle" font-family="system-ui" font-size="10" fill="#888">N+1 redundant CRAC units</text>

  <!-- Layer 3: Network -->
  <rect x="60" y="220" width="380" height="65" rx="10" fill="#FFF5EE" stroke="#E57035" stroke-width="2"/>
  <!-- Network nodes -->
  <circle cx="90" cy="252" r="12" fill="#E57035" opacity="0.2"/>
  <circle cx="130" cy="252" r="12" fill="#E57035" opacity="0.2"/>
  <line x1="102" y1="248" x2="118" y2="248" stroke="#E57035" stroke-width="1.5"/>
  <line x1="102" y1="256" x2="118" y2="256" stroke="#E57035" stroke-width="1.5"/>
  <!-- Arrows -->
  <text x="90" y="256" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">A</text>
  <text x="130" y="256" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">B</text>
  <!-- Label -->
  <text x="340" y="248" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Network</text>
  <text x="340" y="264" text-anchor="middle" font-family="system-ui" font-size="10" fill="#888">Redundant uplinks + BGP</text>

  <!-- Layer 4: Security -->
  <rect x="60" y="300" width="380" height="65" rx="10" fill="#FFF5EE" stroke="#E57035" stroke-width="2"/>
  <!-- Camera icon -->
  <rect x="80" y="322" width="20" height="14" rx="3" fill="#E57035" opacity="0.3"/>
  <rect x="100" y="326" width="8" height="6" rx="1" fill="#E57035" opacity="0.3"/>
  <!-- Badge icon -->
  <rect x="120" y="318" width="18" height="24" rx="3" fill="#E57035" opacity="0.3"/>
  <circle cx="129" cy="326" r="4" fill="none" stroke="#E57035" stroke-width="1"/>
  <line x1="129" y1="333" x2="129" y2="338" stroke="#E57035" stroke-width="1"/>
  <!-- Label -->
  <text x="340" y="328" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Security</text>
  <text x="340" y="344" text-anchor="middle" font-family="system-ui" font-size="10" fill="#888">Cameras + biometric access</text>
</svg>