<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#FDF2ED" rx="20"/>
  <!-- Title -->
  <text x="250" y="40" font-family="system-ui" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">Network Infrastructure</text>
  <!-- Top switch - 10GbE -->
  <rect x="100" y="70" width="300" height="50" fill="#2C3E50" rx="6"/>
  <!-- Switch ports -->
  <rect x="115" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="133" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="151" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="169" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="187" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="205" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="223" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="241" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="259" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="277" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="295" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <rect x="313" y="80" width="14" height="18" fill="#3D5166" rx="2"/>
  <!-- Port activity LEDs -->
  <circle cx="122" cy="106" r="2" fill="#4CAF50"/>
  <circle cx="140" cy="106" r="2" fill="#4CAF50"/>
  <circle cx="158" cy="106" r="2" fill="#4CAF50"/>
  <circle cx="176" cy="106" r="2" fill="#4CAF50"/>
  <circle cx="194" cy="106" r="2" fill="#666"/>
  <circle cx="212" cy="106" r="2" fill="#666"/>
  <!-- Switch label -->
  <text x="355" y="100" font-family="system-ui" font-size="10" font-weight="bold" fill="#FFF">10GbE</text>
  <circle cx="387" cy="82" r="3" fill="#4CAF50"/>
  <!-- 10GbE speed badge -->
  <rect x="410" y="78" width="70" height="24" fill="#E57035" rx="12"/>
  <text x="445" y="94" font-family="system-ui" font-size="10" font-weight="bold" fill="#FFF" text-anchor="middle">10 Gbps</text>
  <!-- Bottom switch - 25GbE -->
  <rect x="100" y="145" width="300" height="50" fill="#1A252F" rx="6"/>
  <rect x="115" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="133" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="151" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="169" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="187" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="205" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="223" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <rect x="241" y="155" width="14" height="18" fill="#2C3E50" rx="2"/>
  <circle cx="122" cy="181" r="2" fill="#4CAF50"/>
  <circle cx="140" cy="181" r="2" fill="#4CAF50"/>
  <circle cx="158" cy="181" r="2" fill="#2196F3"/>
  <circle cx="176" cy="181" r="2" fill="#4CAF50"/>
  <text x="300" y="175" font-family="system-ui" font-size="10" font-weight="bold" fill="#FFF">25GbE</text>
  <circle cx="332" cy="157" r="3" fill="#2196F3"/>
  <!-- 25GbE speed badge -->
  <rect x="410" y="153" width="70" height="24" fill="#E57035" rx="12"/>
  <text x="445" y="169" font-family="system-ui" font-size="10" font-weight="bold" fill="#FFF" text-anchor="middle">25 Gbps</text>
  <!-- Connection lines from switches to servers -->
  <line x1="160" y1="195" x2="110" y2="260" stroke="#E57035" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="250" y1="195" x2="250" y2="260" stroke="#E57035" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="340" y1="195" x2="390" y2="260" stroke="#E57035" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Speed indicators on lines -->
  <circle cx="135" cy="228" r="4" fill="#E57035"/>
  <circle cx="250" cy="228" r="4" fill="#E57035"/>
  <circle cx="365" cy="228" r="4" fill="#E57035"/>
  <!-- Server 1 -->
  <rect x="60" y="260" width="100" height="60" fill="#D0D0D0" rx="6" stroke="#999" stroke-width="1"/>
  <rect x="70" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="83" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="96" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="109" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <circle cx="140" cy="275" r="3" fill="#4CAF50"/>
  <circle cx="140" cy="285" r="3" fill="#4CAF50"/>
  <text x="110" y="310" font-family="system-ui" font-size="9" fill="#777" text-anchor="middle">Server 1</text>
  <!-- Server 2 -->
  <rect x="200" y="260" width="100" height="60" fill="#D0D0D0" rx="6" stroke="#999" stroke-width="1"/>
  <rect x="210" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="223" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="236" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="249" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <circle cx="280" cy="275" r="3" fill="#4CAF50"/>
  <circle cx="280" cy="285" r="3" fill="#2196F3"/>
  <text x="250" y="310" font-family="system-ui" font-size="9" fill="#777" text-anchor="middle">Server 2</text>
  <!-- Server 3 -->
  <rect x="340" y="260" width="100" height="60" fill="#D0D0D0" rx="6" stroke="#999" stroke-width="1"/>
  <rect x="350" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="363" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="376" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <rect x="389" y="270" width="10" height="20" fill="#B0B0B0" rx="1"/>
  <circle cx="420" cy="275" r="3" fill="#4CAF50"/>
  <circle cx="420" cy="285" r="3" fill="#4CAF50"/>
  <text x="390" y="310" font-family="system-ui" font-size="9" fill="#777" text-anchor="middle">Server 3</text>
  <!-- Redundant connection indicator -->
  <rect x="140" y="345" width="220" height="30" fill="#FFF" rx="15" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="365" font-family="system-ui" font-size="12" fill="#E57035" text-anchor="middle">Redundant 10/25GbE Connectivity</text>
</svg>