  <text x="95" y="215" font-family="system-ui" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">1x CPU</text>
  <text x="95" y="235" font-family="system-ui" font-size="12" fill="#777" text-anchor="middle">64 GB RAM</text>
  <text x="95" y="255" font-family="system-ui" font-size="12" fill="#777" text-anchor="middle">SAS HDD</text>
  <!-- Standard Tier -->
  <rect x="185" y="75" width="130" height="220" fill="#FFF" rx="10" stroke="#E57035" stroke-width="2"/>
  <rect x="185" y="75" width="130" height="45" fill="#E57035" rx="10"/>
  <rect x="185" y="100" width="130" height="20" fill="#E57035"/>
  <text x="250" y="103" font-family="system-ui" font-size="15" font-weight="bold" fill="#FFF" text-anchor="middle">Standard</text>
  <!-- Server icon medium -->
  <rect x="210" y="135" width="80" height="40" fill="#E0E0E0" rx="4" stroke="#BBB" stroke-width="1"/>
  <rect x="217" y="142" width="9" height="26" fill="#CCC" rx="1"/>
  <rect x="229" y="142" width="9" height="26" fill="#CCC" rx="1"/>
