  <text x="250" y="40" font-family="system-ui" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">Configuratie Opties</text>
  <!-- Entry Tier -->
  <rect x="30" y="100" width="130" height="180" fill="#FFF" rx="10" stroke="#DDD" stroke-width="1.5"/>
