  <text x="250" y="240" font-family="system-ui" font-size="12" fill="#777" text-anchor="middle">SAS SSD</text>
  <!-- Popular badge -->
  <rect x="207" y="60" width="86" height="22" fill="#E57035" rx="11"/>
  <text x="250" y="75" font-family="system-ui" font-size="10" font-weight="bold" fill="#FFF" text-anchor="middle">POPULAIR</text>
