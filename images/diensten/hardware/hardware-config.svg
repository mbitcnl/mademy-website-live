  <rect x="360" y="115" width="90" height="55" fill="#E0E0E0" rx="4" stroke="#BBB" stroke-width="1"/>
  <rect x="367" y="122" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="380" y="122" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="393" y="122" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="406" y="122" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="419" y="122" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="367" y="146" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="380" y="146" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="393" y="146" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="406" y="146" width="10" height="20" fill="#CCC" rx="1"/>
  <rect x="419" y="146" width="10" height="20" fill="#CCC" rx="1"/>
  <circle cx="438" cy="126" r="3" fill="#4CAF50"/>
  <circle cx="438" cy="136" r="3" fill="#2196F3"/>
  <circle cx="438" cy="146" r="3" fill="#FFC107"/>
  <!-- Specs -->
  <text x="405" y="195" font-family="system-ui" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">2x CPU</text>
  <text x="405" y="215" font-family="system-ui" font-size="12" fill="#777" text-anchor="middle">512 GB RAM</text>
  <text x="405" y="235" font-family="system-ui" font-size="12" fill="#777" text-anchor="middle">NVMe SSD</text>
  <text x="405" y="255" font-family="system-ui" font-size="11" fill="#E57035" text-anchor="middle">GPU Ready</text>
  <!-- Bottom labels -->
  <text x="250" y="355" font-family="system-ui" font-size="13" fill="#999" text-anchor="middle">Alle configuraties inclusief management en monitoring</text>
  <!-- Ascending arrow hint -->
  <line x1="80" y1="330" x2="420" y2="330" stroke="#DDD" stroke-width="1.5"/>
  <polygon points="420,325 435,330 420,335" fill="#DDD"/>
  <text x="250" y="380" font-family="system-ui" font-size="11" fill="#BBB" text-anchor="middle">Performance</text>
