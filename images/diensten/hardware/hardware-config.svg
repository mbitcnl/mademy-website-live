  <rect x="79" y="166" width="8" height="18" fill="#CCC" rx="1"/>
  <rect x="90" y="166" width="8" height="18" fill="#CCC" rx="1"/>
  <circle cx="118" cy="170" r="3" fill="#4CAF50"/>
