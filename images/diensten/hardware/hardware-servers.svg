<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#FDF2ED" rx="20"/>
  <!-- Title -->
  <text x="250" y="45" font-family="system-ui" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">Enterprise Rack Servers</text>
  <!-- 1U Server - HPE -->
  <rect x="80" y="75" width="340" height="50" fill="#D0D0D0" rx="6" stroke="#999" stroke-width="1.5"/>
  <rect x="90" y="85" width="60" height="30" fill="#B0B0B0" rx="3"/>
  <text x="120" y="105" font-family="system-ui" font-size="11" font-weight="bold" fill="#444" text-anchor="middle">HPE</text>
  <!-- Drive bays row -->
  <rect x="160" y="87" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="182" y="87" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="204" y="87" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="226" y="87" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="248" y="87" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="270" y="87" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <!-- LEDs -->
  <circle cx="320" cy="90" r="4" fill="#4CAF50"/>
  <circle cx="335" cy="90" r="4" fill="#2196F3"/>
  <circle cx="350" cy="90" r="4" fill="#4CAF50"/>
  <text x="395" y="105" font-family="system-ui" font-size="10" fill="#777" text-anchor="end">1U</text>
  <!-- 2U Server - Dell -->
  <rect x="80" y="140" width="340" height="80" fill="#C8C8C8" rx="6" stroke="#999" stroke-width="1.5"/>
  <rect x="90" y="152" width="60" height="30" fill="#A8A8A8" rx="3"/>
  <text x="120" y="172" font-family="system-ui" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Dell</text>
  <!-- Drive bays 2x row -->
  <rect x="160" y="150" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="186" y="150" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="212" y="150" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="238" y="150" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="264" y="150" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="290" y="150" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="160" y="182" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="186" y="182" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="212" y="182" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="238" y="182" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="264" y="182" width="22" height="28" fill="#969696" rx="2"/>
  <rect x="290" y="182" width="22" height="28" fill="#969696" rx="2"/>
  <!-- LEDs -->
  <circle cx="340" cy="155" r="4" fill="#4CAF50"/>
  <circle cx="355" cy="155" r="4" fill="#FFC107"/>
  <circle cx="370" cy="155" r="4" fill="#4CAF50"/>
  <text x="395" y="185" font-family="system-ui" font-size="10" fill="#777" text-anchor="end">2U</text>
  <!-- 1U Server - HPE #2 -->
  <rect x="80" y="235" width="340" height="50" fill="#D0D0D0" rx="6" stroke="#999" stroke-width="1.5"/>
  <rect x="90" y="245" width="60" height="30" fill="#B0B0B0" rx="3"/>
  <text x="120" y="265" font-family="system-ui" font-size="11" font-weight="bold" fill="#444" text-anchor="middle">HPE</text>
  <rect x="160" y="247" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="182" y="247" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="204" y="247" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="226" y="247" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="248" y="247" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <rect x="270" y="247" width="18" height="26" fill="#A0A0A0" rx="2"/>
  <circle cx="320" cy="250" r="4" fill="#4CAF50"/>
  <circle cx="335" cy="250" r="4" fill="#4CAF50"/>
  <circle cx="350" cy="250" r="4" fill="#2196F3"/>
  <text x="395" y="265" font-family="system-ui" font-size="10" fill="#777" text-anchor="end">1U</text>
  <!-- Rack rails left -->
  <rect x="68" y="70" width="8" height="225" fill="#888" rx="2"/>
  <!-- Rack rails right -->
  <rect x="424" y="70" width="8" height="225" fill="#888" rx="2"/>
  <!-- Enterprise Grade Badge -->
  <rect x="155" y="320" width="190" height="45" fill="#E57035" rx="22"/>
  <text x="250" y="348" font-family="system-ui" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">Enterprise Grade</text>
