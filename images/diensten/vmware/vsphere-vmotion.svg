<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#333">vMotion — Live VM Migration</text>

  <!-- Source Host -->
  <rect x="30" y="70" width="170" height="220" rx="12" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="30" y="70" width="170" height="30" rx="12" fill="#E57035" opacity="0.15"/>
  <rect x="30" y="90" width="170" height="10" fill="#E57035" opacity="0.15"/>
  <text x="115" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Source Host</text>

  <!-- VM being migrated (fading out) -->
  <rect x="55" y="115" width="120" height="70" rx="8" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="115" y="145" text-anchor="middle" font-family="system-ui" font-size="11" fill="#E57035" opacity="0.5">VM</text>
  <text x="115" y="162" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.4">(migrating...)</text>

  <!-- Other VMs staying -->
  <rect x="55" y="200" width="52" height="35" rx="5" fill="#E57035" opacity="0.12" stroke="#E57035" stroke-width="1"/>
  <text x="81" y="222" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM2</text>
  <rect x="118" y="200" width="52" height="35" rx="5" fill="#E57035" opacity="0.12" stroke="#E57035" stroke-width="1"/>
  <text x="144" y="222" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM3</text>

  <!-- Status -->
  <text x="115" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Active</text>

  <!-- Destination Host -->
  <rect x="300" y="70" width="170" height="220" rx="12" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="300" y="70" width="170" height="30" rx="12" fill="#E57035" opacity="0.15"/>
  <rect x="300" y="90" width="170" height="10" fill="#E57035" opacity="0.15"/>
  <text x="385" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Target Host</text>

  <!-- VM arriving (fading in) -->
  <rect x="325" y="115" width="120" height="70" rx="8" fill="#E57035" opacity="0.15" stroke="#E57035" stroke-width="2"/>
  <text x="385" y="145" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">VM</text>
  <text x="385" y="162" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">(arriving)</text>

  <!-- Other VMs -->
  <rect x="325" y="200" width="52" height="35" rx="5" fill="#E57035" opacity="0.12" stroke="#E57035" stroke-width="1"/>
  <text x="351" y="222" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM4</text>
  <rect x="388" y="200" width="52" height="35" rx="5" fill="#E57035" opacity="0.12" stroke="#E57035" stroke-width="1"/>
  <text x="414" y="222" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM5</text>

  <text x="385" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Active</text>

  <!-- Migration arrow -->
  <line x1="200" y1="150" x2="290" y2="150" stroke="#E57035" stroke-width="3"/>
  <!-- Arrow head -->
  <polygon points="290,143 305,150 290,157" fill="#E57035"/>
  <!-- Data dots along arrow -->
  <circle cx="220" cy="150" r="3" fill="#E57035" opacity="0.3"/>
  <circle cx="240" cy="150" r="3" fill="#E57035" opacity="0.5"/>
  <circle cx="260" cy="150" r="3" fill="#E57035" opacity="0.7"/>
  <circle cx="280" cy="150" r="3" fill="#E57035" opacity="0.9"/>

  <!-- Memory state label -->
  <text x="250" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">Memory + State</text>

  <!-- Zero downtime badge -->
  <rect x="160" y="310" width="180" height="45" rx="22" fill="#E57035" opacity="0.12" stroke="#E57035" stroke-width="2"/>
  <text x="250" y="330" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Zero Downtime</text>
  <text x="250" y="346" text-anchor="middle" font-family="system-ui" font-size="10" fill="#999">No interruption to services</text>

  <!-- Network line at bottom -->
  <line x1="60" y1="375" x2="440" y2="375" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>
  <circle cx="115" cy="375" r="4" fill="#E57035" opacity="0.4"/>
  <circle cx="250" cy="375" r="4" fill="#E57035" opacity="0.4"/>
  <circle cx="385" cy="375" r="4" fill="#E57035" opacity="0.4"/>
  <text x="250" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">vMotion Network</text>
</svg>