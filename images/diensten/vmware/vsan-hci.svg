<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#333">HCI — Hyper-Converged Infrastructure</text>

  <!-- Traditional (left side) -->
  <text x="125" y="60" text-anchor="middle" font-family="system-ui" font-size="11" fill="#999">Traditional</text>

  <!-- Separate silos -->
  <rect x="30" y="75" width="70" height="140" rx="8" fill="white" stroke="#E57035" stroke-width="1.5" opacity="0.6"/>
  <text x="65" y="95" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">Compute</text>
  <rect x="42" y="105" width="46" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="42" y="123" width="46" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="42" y="141" width="46" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="42" y="159" width="46" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="42" y="177" width="46" height="14" rx="3" fill="#E57035" opacity="0.15"/>

  <rect x="110" y="75" width="70" height="140" rx="8" fill="white" stroke="#E57035" stroke-width="1.5" opacity="0.6"/>
  <text x="145" y="95" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">Storage</text>
  <rect x="120" y="105" width="50" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="120" y="123" width="50" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="120" y="141" width="50" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="120" y="159" width="50" height="14" rx="3" fill="#E57035" opacity="0.15"/>

  <rect x="30" y="225" width="150" height="30" rx="6" fill="white" stroke="#E57035" stroke-width="1.5" opacity="0.6"/>
  <text x="105" y="244" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">Network Switches</text>

  <!-- X mark over traditional -->
  <line x1="40" y1="80" x2="170" y2="250" stroke="#cc3333" stroke-width="1.5" opacity="0.3"/>
  <line x1="170" y1="80" x2="40" y2="250" stroke="#cc3333" stroke-width="1.5" opacity="0.3"/>

  <!-- Arrow -->
  <line x1="205" y1="160" x2="250" y2="160" stroke="#E57035" stroke-width="2.5"/>
  <polygon points="248,153 262,160 248,167" fill="#E57035"/>

  <!-- HCI Platform (right side) -->
  <text x="370" y="60" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">HCI with vSAN</text>

  <!-- Unified platform box -->
  <rect x="270" y="75" width="200" height="200" rx="12" fill="white" stroke="#E57035" stroke-width="2.5"/>

  <!-- Compute layer -->
  <rect x="285" y="90" width="170" height="45" rx="6" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1.2"/>
  <circle cx="305" cy="112" r="10" fill="#E57035" opacity="0.2"/>
  <text x="305" y="116" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">C</text>
  <circle cx="335" cy="112" r="10" fill="#E57035" opacity="0.2"/>
  <text x="335" y="116" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">C</text>
  <circle cx="365" cy="112" r="10" fill="#E57035" opacity="0.2"/>
  <text x="365" y="116" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">C</text>
  <text x="425" y="116" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Compute</text>

  <!-- Storage layer -->
  <rect x="285" y="145" width="170" height="45" rx="6" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1.2"/>
  <rect x="295" y="158" width="16" height="18" rx="3" fill="#E57035" opacity="0.3"/>
  <rect x="318" y="158" width="16" height="18" rx="3" fill="#E57035" opacity="0.3"/>
  <rect x="341" y="158" width="16" height="18" rx="3" fill="#E57035" opacity="0.3"/>
  <text x="425" y="172" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Storage</text>

  <!-- Network layer -->
  <rect x="285" y="200" width="170" height="45" rx="6" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1.2"/>
  <line x1="300" y1="222" x2="370" y2="222" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <circle cx="310" cy="222" r="4" fill="#E57035" opacity="0.4"/>
  <circle cx="335" cy="222" r="4" fill="#E57035" opacity="0.4"/>
  <circle cx="360" cy="222" r="4" fill="#E57035" opacity="0.4"/>
  <text x="425" y="226" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Network</text>

  <!-- Benefits at bottom -->
  <rect x="40" y="300" width="120" height="70" rx="8" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <text x="100" y="325" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Simplified</text>
  <text x="100" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Single platform</text>
  <text x="100" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">management</text>

  <rect x="190" y="300" width="120" height="70" rx="8" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <text x="250" y="325" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Scalable</text>
  <text x="250" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Add nodes to</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">grow capacity</text>

  <rect x="340" y="300" width="120" height="70" rx="8" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Efficient</text>
  <text x="400" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Reduced cost</text>
  <text x="400" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">&amp; complexity</text>
</svg>