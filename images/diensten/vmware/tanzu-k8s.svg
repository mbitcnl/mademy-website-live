<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#333">Tanzu — Kubernetes Cluster</text>

  <!-- Cluster boundary -->
  <rect x="30" y="50" width="440" height="295" rx="15" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="30" y="50" width="440" height="30" rx="15" fill="#E57035" opacity="0.12"/>
  <rect x="30" y="68" width="440" height="12" fill="#E57035" opacity="0.12"/>
  <text x="250" y="70" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Kubernetes Cluster</text>

  <!-- Control Plane -->
  <rect x="155" y="90" width="190" height="40" rx="8" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="114" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Control Plane (API Server, etcd, Scheduler)</text>

  <!-- Connection lines from control plane to worker nodes -->
  <line x1="250" y1="130" x2="110" y2="155" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="250" y1="130" x2="250" y2="155" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="250" y1="130" x2="390" y2="155" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Worker Node 1 -->
  <rect x="40" y="155" width="140" height="170" rx="10" fill="#E57035" opacity="0.04" stroke="#E57035" stroke-width="1.5"/>
  <text x="110" y="175" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Worker Node 1</text>

  <!-- Pods in Node 1 -->
  <rect x="52" y="185" width="55" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="60" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <rect x="78" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="79" y="220" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <rect x="115" y="185" width="55" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="123" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="142" y="220" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <rect x="52" y="235" width="55" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="60" y="243" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="79" y="270" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <!-- Kubelet -->
  <rect x="60" y="285" width="70" height="18" rx="4" fill="#E57035" opacity="0.15"/>
  <text x="95" y="297" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">kubelet</text>

  <!-- Worker Node 2 -->
  <rect x="195" y="155" width="110" height="170" rx="10" fill="#E57035" opacity="0.04" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="175" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Worker Node 2</text>

  <rect x="207" y="185" width="85" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="215" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <rect x="233" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <rect x="251" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="249" y="220" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod (3 containers)</text>

  <rect x="207" y="235" width="85" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="215" y="243" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="249" y="270" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <rect x="215" y="285" width="70" height="18" rx="4" fill="#E57035" opacity="0.15"/>
  <text x="250" y="297" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">kubelet</text>

  <!-- Worker Node 3 -->
  <rect x="320" y="155" width="140" height="170" rx="10" fill="#E57035" opacity="0.04" stroke="#E57035" stroke-width="1.5"/>
  <text x="390" y="175" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Worker Node 3</text>

  <rect x="332" y="185" width="55" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="340" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <rect x="358" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="359" y="220" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <rect x="395" y="185" width="55" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="403" y="193" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="422" y="220" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <rect x="332" y="235" width="55" height="40" rx="6" fill="white" stroke="#E57035" stroke-width="1.2"/>
  <rect x="340" y="243" width="14" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="359" y="270" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Pod</text>

  <rect x="355" y="285" width="70" height="18" rx="4" fill="#E57035" opacity="0.15"/>
  <text x="390" y="297" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">kubelet</text>

  <!-- vSphere integration bar -->
  <rect x="30" y="355" width="440" height="35" rx="8" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="377" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">vSphere with Tanzu — Native Kubernetes on VMware</text>
</svg>