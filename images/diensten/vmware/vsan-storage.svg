<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#333">vSAN — Distributed Storage</text>

  <!-- Node 1 -->
  <rect x="30" y="70" width="120" height="180" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="30" y="70" width="120" height="28" rx="10" fill="#E57035" opacity="0.15"/>
  <rect x="30" y="88" width="120" height="10" fill="#E57035" opacity="0.15"/>
  <text x="90" y="89" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Node 1</text>
  <!-- Disks -->
  <rect x="42" y="110" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="90" y="123" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">SSD Cache</text>
  <rect x="42" y="135" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="90" y="148" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">Capacity Disk 1</text>
  <rect x="42" y="160" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="90" y="173" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">Capacity Disk 2</text>
  <!-- Disk group label -->
  <text x="90" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Disk Group</text>
  <!-- Data indicator -->
  <rect x="50" y="210" width="30" height="15" rx="3" fill="#E57035" opacity="0.3"/>
  <rect x="85" y="210" width="30" height="15" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="90" y="240" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Data + Replica</text>

  <!-- Node 2 -->
  <rect x="190" y="70" width="120" height="180" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="190" y="70" width="120" height="28" rx="10" fill="#E57035" opacity="0.15"/>
  <rect x="190" y="88" width="120" height="10" fill="#E57035" opacity="0.15"/>
  <text x="250" y="89" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Node 2</text>
  <rect x="202" y="110" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="250" y="123" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">SSD Cache</text>
  <rect x="202" y="135" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="250" y="148" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">Capacity Disk 1</text>
  <rect x="202" y="160" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="250" y="173" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">Capacity Disk 2</text>
  <text x="250" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Disk Group</text>
  <rect x="210" y="210" width="30" height="15" rx="3" fill="#E57035" opacity="0.3"/>
  <rect x="245" y="210" width="30" height="15" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="250" y="240" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Data + Replica</text>

  <!-- Node 3 -->
  <rect x="350" y="70" width="120" height="180" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="350" y="70" width="120" height="28" rx="10" fill="#E57035" opacity="0.15"/>
  <rect x="350" y="88" width="120" height="10" fill="#E57035" opacity="0.15"/>
  <text x="410" y="89" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Node 3</text>
  <rect x="362" y="110" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="410" y="123" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">SSD Cache</text>
  <rect x="362" y="135" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="410" y="148" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">Capacity Disk 1</text>
  <rect x="362" y="160" width="96" height="18" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="410" y="173" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035">Capacity Disk 2</text>
  <text x="410" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Disk Group</text>
  <rect x="370" y="210" width="30" height="15" rx="3" fill="#E57035" opacity="0.3"/>
  <rect x="405" y="210" width="30" height="15" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="410" y="240" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Data + Replica</text>

  <!-- Replication arrows between nodes -->
  <!-- Node 1 to Node 2 -->
  <line x1="150" y1="145" x2="190" y2="145" stroke="#E57035" stroke-width="2"/>
  <polygon points="186,140 194,145 186,150" fill="#E57035"/>
  <!-- Node 2 to Node 1 -->
  <line x1="190" y1="160" x2="150" y2="160" stroke="#E57035" stroke-width="2"/>
  <polygon points="154,155 146,160 154,165" fill="#E57035"/>

  <!-- Node 2 to Node 3 -->
  <line x1="310" y1="145" x2="350" y2="145" stroke="#E57035" stroke-width="2"/>
  <polygon points="346,140 354,145 346,150" fill="#E57035"/>
  <!-- Node 3 to Node 2 -->
  <line x1="350" y1="160" x2="310" y2="160" stroke="#E57035" stroke-width="2"/>
  <polygon points="314,155 306,160 314,165" fill="#E57035"/>

  <!-- Node 1 to Node 3 (curved) -->
  <line x1="90" y1="250" x2="410" y2="250" stroke="#E57035" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- vSAN Datastore bar -->
  <rect x="50" y="280" width="400" height="45" rx="10" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">vSAN Distributed Datastore</text>
  <text x="250" y="316" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Single shared storage pool across all nodes</text>

  <!-- Policy labels -->
  <rect x="80" y="345" width="100" height="25" rx="12" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1"/>
  <text x="130" y="362" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">FTT = 1</text>

  <rect x="200" y="345" width="100" height="25" rx="12" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1"/>
  <text x="250" y="362" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">RAID-1</text>

  <rect x="320" y="345" width="100" height="25" rx="12" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1"/>
  <text x="370" y="362" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">Dedup</text>

  <text x="250" y="390" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Storage Policies</text>
</svg>