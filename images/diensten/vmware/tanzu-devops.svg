<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#333">DevOps — CI/CD Pipeline</text>

  <!-- Pipeline flow -->
  <!-- Stage 1: Code -->
  <rect x="20" y="70" width="85" height="90" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="20" y="70" width="85" height="25" rx="10" fill="#E57035" opacity="0.15"/>
  <rect x="20" y="85" width="85" height="10" fill="#E57035" opacity="0.15"/>
  <text x="62" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Code</text>
  <!-- Code lines -->
  <line x1="32" y1="108" x2="65" y2="108" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>
  <line x1="32" y1="118" x2="80" y2="118" stroke="#E57035" stroke-width="1.5" opacity="0.3"/>
  <line x1="32" y1="128" x2="55" y2="128" stroke="#E57035" stroke-width="1.5" opacity="0.4"/>
  <line x1="32" y1="138" x2="72" y2="138" stroke="#E57035" stroke-width="1.5" opacity="0.3"/>
  <text x="62" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Git Push</text>

  <!-- Arrow 1 -->
  <line x1="105" y1="115" x2="125" y2="115" stroke="#E57035" stroke-width="2"/>
  <polygon points="123,109 133,115 123,121" fill="#E57035"/>

  <!-- Stage 2: Build -->
  <rect x="135" y="70" width="85" height="90" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="135" y="70" width="85" height="25" rx="10" fill="#E57035" opacity="0.15"/>
  <rect x="135" y="85" width="85" height="10" fill="#E57035" opacity="0.15"/>
  <text x="177" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Build</text>
  <!-- Gear icon -->
  <circle cx="177" cy="120" r="15" fill="none" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <circle cx="177" cy="120" r="6" fill="#E57035" opacity="0.2"/>
  <rect x="174" y="102" width="6" height="8" rx="1" fill="#E57035" opacity="0.3"/>
  <rect x="174" y="130" width="6" height="8" rx="1" fill="#E57035" opacity="0.3"/>
  <text x="177" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Compile</text>

  <!-- Arrow 2 -->
  <line x1="220" y1="115" x2="240" y2="115" stroke="#E57035" stroke-width="2"/>
  <polygon points="238,109 248,115 238,121" fill="#E57035"/>

  <!-- Stage 3: Test -->
  <rect x="250" y="70" width="85" height="90" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="250" y="70" width="85" height="25" rx="10" fill="#E57035" opacity="0.15"/>
  <rect x="250" y="85" width="85" height="10" fill="#E57035" opacity="0.15"/>
  <text x="292" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Test</text>
  <!-- Checkmarks -->
  <text x="275" y="115" font-family="system-ui" font-size="11" fill="#4CAF50">&#x2713;</text>
  <text x="290" y="115" font-family="system-ui" font-size="11" fill="#4CAF50">&#x2713;</text>
  <text x="305" y="115" font-family="system-ui" font-size="11" fill="#4CAF50">&#x2713;</text>
  <text x="275" y="135" font-family="system-ui" font-size="11" fill="#4CAF50">&#x2713;</text>
  <text x="290" y="135" font-family="system-ui" font-size="11" fill="#E57035">&#x2717;</text>
  <text x="305" y="135" font-family="system-ui" font-size="11" fill="#4CAF50">&#x2713;</text>
  <text x="292" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Unit + Integration</text>

  <!-- Arrow 3 -->
  <line x1="335" y1="115" x2="355" y2="115" stroke="#E57035" stroke-width="2"/>
  <polygon points="353,109 363,115 353,121" fill="#E57035"/>

  <!-- Stage 4: Deploy -->
  <rect x="365" y="70" width="115" height="90" rx="10" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <rect x="365" y="70" width="115" height="25" rx="10" fill="#E57035" opacity="0.2"/>
  <rect x="365" y="85" width="115" height="10" fill="#E57035" opacity="0.2"/>
  <text x="422" y="88" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Deploy</text>
  <!-- Container/rocket -->
  <rect x="398" y="100" width="20" height="25" rx="4" fill="#E57035" opacity="0.2" stroke="#E57035" stroke-width="1.2"/>
  <rect x="422" y="100" width="20" height="25" rx="4" fill="#E57035" opacity="0.2" stroke="#E57035" stroke-width="1.2"/>
  <line x1="408" y1="130" x2="408" y2="145" stroke="#E57035" stroke-width="1" opacity="0.4"/>
  <line x1="432" y1="130" x2="432" y2="145" stroke="#E57035" stroke-width="1" opacity="0.4"/>
  <text x="422" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">K8s Cluster</text>

  <!-- Environment sections -->
  <!-- Dev -->
  <rect x="20" y="195" width="140" height="85" rx="10" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="90" y="215" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Development</text>
  <rect x="35" y="225" width="45" height="25" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="57" y="241" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">v0.1-dev</text>
  <rect x="90" y="225" width="55" height="25" rx="4" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1"/>
  <text x="117" y="241" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">feature/*</text>

  <!-- Arrow -->
  <line x1="160" y1="237" x2="180" y2="237" stroke="#E57035" stroke-width="2"/>
  <polygon points="178,231 188,237 178,243" fill="#E57035"/>

  <!-- Staging -->
  <rect x="190" y="195" width="140" height="85" rx="10" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="260" y="215" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Staging</text>
  <rect x="205" y="225" width="50" height="25" rx="4" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1"/>
  <text x="230" y="241" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">v0.1-rc1</text>
  <rect x="265" y="225" width="50" height="25" rx="4" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1"/>
  <text x="290" y="241" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">UAT</text>

  <!-- Arrow -->
  <line x1="330" y1="237" x2="350" y2="237" stroke="#E57035" stroke-width="2"/>
  <polygon points="348,231 358,237 348,243" fill="#E57035"/>

  <!-- Production -->
  <rect x="360" y="195" width="120" height="85" rx="10" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <text x="420" y="215" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">Production</text>
  <rect x="375" y="225" width="50" height="25" rx="4" fill="#E57035" opacity="0.15" stroke="#E57035" stroke-width="1.2"/>
  <text x="400" y="241" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">v1.0.0</text>
  <circle cx="445" cy="237" r="8" fill="#4CAF50" opacity="0.3"/>
  <circle cx="445" cy="237" r="4" fill="#4CAF50"/>

  <!-- Feedback loop -->
  <rect x="60" y="305" width="380" height="40" rx="10" fill="#E57035" opacity="0.08" stroke="#E57035" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="250" y="325" text-anchor="middle" font-family="system-ui" font-size="10" fill="#E57035">Continuous Feedback &amp; Monitoring</text>
  <text x="250" y="338" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Metrics, Logs, Alerts</text>

  <!-- Arrows from feedback back -->
  <line x1="100" y1="305" x2="100" y2="280" stroke="#E57035" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="260" y1="305" x2="260" y2="280" stroke="#E57035" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="420" y1="305" x2="420" y2="280" stroke="#E57035" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Tanzu label -->
  <rect x="150" y="360" width="200" height="28" rx="14" fill="#E57035" opacity="0.12" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="378" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">Powered by VMware Tanzu</text>
</svg>