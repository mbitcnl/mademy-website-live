<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#E57035"/>
    </marker>
  </defs>

  <!-- Fleet Manager central rect -->
  <rect x="125" y="80" width="250" height="70" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#E57035">VCF Operations</text>
  <text x="250" y="132" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Fleet Manager</text>

  <!-- Dashed arrows to each instance -->
  <line x1="200" y1="150" x2="90" y2="235" stroke="#E57035" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <line x1="250" y1="150" x2="250" y2="235" stroke="#E57035" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <line x1="300" y1="150" x2="410" y2="235" stroke="#E57035" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- Instance A -->
  <rect x="40" y="240" width="100" height="110" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="90" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">VCF Instance A</text>
  <text x="90" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>

  <!-- Instance B -->
  <rect x="200" y="240" width="100" height="110" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="250" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">VCF Instance B</text>
  <text x="250" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>

  <!-- Instance C -->
  <rect x="360" y="240" width="100" height="110" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="410" y="275" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">VCF Instance C</text>
  <text x="410" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>
</svg>
