<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Private Cloud outer band -->
  <rect x="20" y="40" width="460" height="280" rx="10" fill="#E57035" fill-opacity="0.15" stroke="#E57035" stroke-width="2"/>
  <text x="250" y="65" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#E57035">Private Cloud</text>

  <!-- Fleet A -->
  <rect x="40" y="90" width="200" height="200" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Fleet</text>
  <text x="140" y="133" text-anchor="middle" font-family="system-ui" font-size="10" fill="#E57035">VCF Operations · VCF Automation</text>

  <!-- Instances inside Fleet A (stacked vertically) -->
  <rect x="55" y="150" width="170" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="140" y="172" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Instance</text>
  <text x="140" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>

  <rect x="55" y="215" width="170" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="140" y="237" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Instance</text>
  <text x="140" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>

  <!-- Fleet B -->
  <rect x="260" y="90" width="200" height="200" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <text x="360" y="115" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#E57035">Fleet</text>
  <text x="360" y="133" text-anchor="middle" font-family="system-ui" font-size="10" fill="#E57035">VCF Operations · VCF Automation</text>

  <!-- Instances inside Fleet B (stacked vertically) -->
  <rect x="275" y="150" width="170" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="360" y="172" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Instance</text>
  <text x="360" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>

  <rect x="275" y="215" width="170" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="360" y="237" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">Instance</text>
  <text x="360" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">vSphere · NSX · vSAN</text>
</svg>
