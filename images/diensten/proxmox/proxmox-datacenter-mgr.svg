  <text x="390" y="275" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">node-7 (active)</text>
  <circle cx="375" cy="288" r="4" fill="#4CAF50"/>
  <text x="390" y="291" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">node-8 (active)</text>
  <circle cx="375" cy="304" r="4" fill="#4CAF50"/>
  <text x="390" y="307" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">node-9 (active)</text>

  <text x="420" y="332" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.5">4 VMs | 6 CTs</text>

