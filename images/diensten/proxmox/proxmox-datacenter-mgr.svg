  <circle cx="180" cy="387" r="3" fill="#4CAF50"/>
  <text x="250" y="391" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">All clusters synced - Last: 2 min ago</text>
