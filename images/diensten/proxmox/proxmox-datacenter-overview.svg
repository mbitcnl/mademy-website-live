<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#E57035">Multi-Site Overview</text>

  <!-- Abstract world map background -->
  <ellipse cx="250" cy="200" rx="210" ry="130" fill="none" stroke="#E57035" stroke-width="1" opacity="0.1"/>
  <ellipse cx="250" cy="200" rx="210" ry="130" fill="none" stroke="#E57035" stroke-width="0.5" opacity="0.08" transform="rotate(30 250 200)"/>
  <ellipse cx="250" cy="200" rx="210" ry="130" fill="none" stroke="#E57035" stroke-width="0.5" opacity="0.08" transform="rotate(-30 250 200)"/>

  <!-- Grid lines for map feel -->
  <line x1="60" y1="200" x2="440" y2="200" stroke="#E57035" stroke-width="0.5" opacity="0.06"/>
  <line x1="250" y1="75" x2="250" y2="325" stroke="#E57035" stroke-width="0.5" opacity="0.06"/>
  <line x1="80" y1="140" x2="420" y2="140" stroke="#E57035" stroke-width="0.5" opacity="0.04"/>
  <line x1="80" y1="260" x2="420" y2="260" stroke="#E57035" stroke-width="0.5" opacity="0.04"/>

  <!-- Connection lines between datacenters -->
  <line x1="115" y1="150" x2="260" y2="125" stroke="#E57035" stroke-width="2" opacity="0.25" stroke-dasharray="6,3"/>
  <line x1="260" y1="125" x2="395" y2="210" stroke="#E57035" stroke-width="2" opacity="0.25" stroke-dasharray="6,3"/>
  <line x1="115" y1="150" x2="395" y2="210" stroke="#E57035" stroke-width="2" opacity="0.25" stroke-dasharray="6,3"/>

  <!-- Animated data flow dots -->
  <circle r="3" fill="#E57035" opacity="0.6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M115,150 L260,125"/>
  </circle>
  <circle r="3" fill="#E57035" opacity="0.6">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M260,125 L395,210"/>
  </circle>
  <circle r="3" fill="#E57035" opacity="0.6">
    <animateMotion dur="4s" repeatCount="indefinite" path="M395,210 L115,150"/>
  </circle>

  <!-- Datacenter 1: Europe -->
  <circle cx="115" cy="150" r="30" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <circle cx="115" cy="150" r="22" fill="#E57035" opacity="0.1"/>
  <!-- Server icon -->
  <rect x="106" y="139" width="18" height="22" rx="3" fill="#E57035" opacity="0.3"/>
  <line x1="109" y1="145" x2="121" y2="145" stroke="white" stroke-width="1"/>
  <line x1="109" y1="150" x2="121" y2="150" stroke="white" stroke-width="1"/>
  <line x1="109" y1="155" x2="121" y2="155" stroke="white" stroke-width="1"/>

  <rect x="60" y="185" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="115" y="200" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">EU-West</text>
  <text x="115" y="214" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">Amsterdam, NL</text>
  <circle cx="80" cy="228" r="3" fill="#4CAF50"/>
  <text x="88" y="231" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">3 Nodes | 10 VMs</text>
  <line x1="115" y1="175" x2="115" y2="185" stroke="#E57035" stroke-width="1" opacity="0.3"/>

  <!-- Datacenter 2: US -->
  <circle cx="260" cy="125" r="30" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <circle cx="260" cy="125" r="22" fill="#E57035" opacity="0.1"/>
  <rect x="251" y="114" width="18" height="22" rx="3" fill="#E57035" opacity="0.3"/>
  <line x1="254" y1="120" x2="266" y2="120" stroke="white" stroke-width="1"/>
  <line x1="254" y1="125" x2="266" y2="125" stroke="white" stroke-width="1"/>
  <line x1="254" y1="130" x2="266" y2="130" stroke="white" stroke-width="1"/>

  <rect x="205" y="160" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="260" y="175" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">US-East</text>
  <text x="260" y="189" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">Virginia, US</text>
  <circle cx="225" cy="203" r="3" fill="#4CAF50"/>
  <text x="233" y="206" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">4 Nodes | 14 VMs</text>
  <line x1="260" y1="150" x2="260" y2="160" stroke="#E57035" stroke-width="1" opacity="0.3"/>

  <!-- Datacenter 3: Asia -->
  <circle cx="395" cy="210" r="30" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <circle cx="395" cy="210" r="22" fill="#E57035" opacity="0.1"/>
  <rect x="386" y="199" width="18" height="22" rx="3" fill="#E57035" opacity="0.3"/>
  <line x1="389" y1="205" x2="401" y2="205" stroke="white" stroke-width="1"/>
  <line x1="389" y1="210" x2="401" y2="210" stroke="white" stroke-width="1"/>
  <line x1="389" y1="215" x2="401" y2="215" stroke="white" stroke-width="1"/>

  <rect x="340" y="245" width="110" height="55" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="395" y="260" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">AP-Southeast</text>
  <text x="395" y="274" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">Singapore, SG</text>
  <circle cx="360" cy="288" r="3" fill="#4CAF50"/>
  <text x="368" y="291" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">2 Nodes | 6 VMs</text>
  <line x1="395" y1="235" x2="395" y2="245" stroke="#E57035" stroke-width="1" opacity="0.3"/>

  <!-- Latency labels on connections -->
  <rect x="165" y="127" width="40" height="14" rx="7" fill="white" stroke="#E57035" stroke-width="0.5"/>
  <text x="185" y="137" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">85ms</text>

  <rect x="318" y="155" width="40" height="14" rx="7" fill="white" stroke="#E57035" stroke-width="0.5"/>
  <text x="338" y="165" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">180ms</text>

  <rect x="230" y="195" width="40" height="14" rx="7" fill="white" stroke="#E57035" stroke-width="0.5"/>
  <text x="250" y="205" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">220ms</text>

  <!-- Status bar -->
  <rect x="100" y="330" width="300" height="35" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="347" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#E57035">Global Status</text>
  <circle cx="170" cy="356" r="4" fill="#4CAF50"/>
  <text x="180" y="359" font-family="system-ui" font-size="7" fill="#4CAF50">All sites operational</text>
  <text x="310" y="359" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">9 Nodes | 30 VMs</text>

  <!-- Footer -->
  <text x="250" y="388" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035" opacity="0.5">Multi-site Proxmox Cluster Federation</text>
</svg>