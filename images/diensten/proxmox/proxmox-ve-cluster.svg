<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#E57035">Proxmox VE Cluster</text>

  <!-- Cluster ring -->
  <ellipse cx="250" cy="200" rx="180" ry="80" fill="none" stroke="#E57035" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>

  <!-- Node 1 -->
  <rect x="50" y="120" width="100" height="70" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="58" y="128" width="84" height="12" rx="2" fill="#E57035" opacity="0.15"/>
  <text x="100" y="137" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">NODE 1</text>
  <rect x="60" y="148" width="28" height="18" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="74" y="160" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="92" y="148" width="28" height="18" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="106" y="160" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="60" y="170" width="28" height="18" rx="3" fill="#E57035" opacity="0.35"/>
  <text x="74" y="182" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">LXC</text>

  <!-- Node 2 -->
  <rect x="200" y="70" width="100" height="70" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="208" y="78" width="84" height="12" rx="2" fill="#E57035" opacity="0.15"/>
  <text x="250" y="87" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">NODE 2</text>
  <rect x="210" y="98" width="28" height="18" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="224" y="110" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="242" y="98" width="28" height="18" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="256" y="110" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="274" y="98" width="18" height="18" rx="3" fill="#E57035" opacity="0.35"/>
  <text x="283" y="110" text-anchor="middle" font-family="system-ui" font-size="5" fill="#E57035">LXC</text>

  <!-- Node 3 -->
  <rect x="350" y="120" width="100" height="70" rx="8" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="358" y="128" width="84" height="12" rx="2" fill="#E57035" opacity="0.15"/>
  <text x="400" y="137" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">NODE 3</text>
  <rect x="360" y="148" width="28" height="18" rx="3" fill="#E57035" opacity="0.2"/>
  <text x="374" y="160" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="392" y="148" width="28" height="18" rx="3" fill="#E57035" opacity="0.35"/>
  <text x="406" y="160" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">LXC</text>
  <rect x="392" y="170" width="28" height="18" rx="3" fill="#E57035" opacity="0.35"/>
  <text x="406" y="182" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">LXC</text>

  <!-- Connection lines -->
  <line x1="150" y1="155" x2="200" y2="120" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="120" x2="350" y2="155" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="175" x2="350" y2="175" stroke="#E57035" stroke-width="1.5" opacity="0.5"/>

  <!-- HA Badge -->
  <rect x="195" y="240" width="110" height="32" rx="16" fill="#E57035"/>
  <text x="250" y="260" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">HA Cluster</text>

  <!-- Quorum indicator -->
  <text x="250" y="295" text-anchor="middle" font-family="system-ui" font-size="10" fill="#E57035" opacity="0.7">Quorum: 3/3 nodes online</text>

  <!-- Shared storage -->
  <rect x="150" y="315" width="200" height="40" rx="8" fill="white" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="160" y="325" width="16" height="20" rx="2" fill="#E57035" opacity="0.3"/>
  <rect x="180" y="325" width="16" height="20" rx="2" fill="#E57035" opacity="0.3"/>
  <rect x="200" y="325" width="16" height="20" rx="2" fill="#E57035" opacity="0.3"/>
  <text x="280" y="339" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">Shared Storage</text>

  <!-- Lines from nodes to storage -->
  <line x1="100" y1="190" x2="200" y2="315" stroke="#E57035" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="272" x2="250" y2="315" stroke="#E57035" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="190" x2="300" y2="315" stroke="#E57035" stroke-width="1" opacity="0.3"/>

  <!-- Footer -->
  <text x="250" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.5">High Availability Virtualization Cluster</text>
</svg>