<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#E57035">Live Migration</text>

  <!-- Source Node -->
  <rect x="30" y="80" width="160" height="200" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="30" y="80" width="160" height="30" rx="10" fill="#E57035" opacity="0.12"/>
  <text x="110" y="100" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">PVE Node 1</text>

  <!-- Source VMs -->
  <rect x="45" y="125" width="130" height="40" rx="6" fill="#E57035" opacity="0.1" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.5">VM 100</text>
  <text x="110" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.4">Migrating...</text>

  <rect x="45" y="175" width="130" height="35" rx="6" fill="#E57035" opacity="0.15"/>
  <text x="110" y="197" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM 101 - Running</text>

  <rect x="45" y="220" width="130" height="35" rx="6" fill="#E57035" opacity="0.15"/>
  <text x="110" y="242" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">CT 200 - Running</text>

  <!-- Target Node -->
  <rect x="310" y="80" width="160" height="200" rx="10" fill="white" stroke="#E57035" stroke-width="2"/>
  <rect x="310" y="80" width="160" height="30" rx="10" fill="#E57035" opacity="0.12"/>
  <text x="390" y="100" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#E57035">PVE Node 2</text>

  <!-- Target VMs -->
  <rect x="325" y="125" width="130" height="40" rx="6" fill="#E57035" opacity="0.2" stroke="#E57035" stroke-width="1.5">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="390" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM 100</text>
  <text x="390" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">Receiving...</text>

  <rect x="325" y="175" width="130" height="35" rx="6" fill="#E57035" opacity="0.15"/>
  <text x="390" y="197" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">VM 102 - Running</text>

  <!-- Migration Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E57035"/>
    </marker>
  </defs>

  <!-- Arrow line with animation -->
  <line x1="190" y1="145" x2="320" y2="145" stroke="#E57035" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Moving dots on the arrow -->
  <circle r="4" fill="#E57035">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M195,145 L315,145"/>
  </circle>
  <circle r="3" fill="#E57035" opacity="0.5">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.5s" path="M195,145 L315,145"/>
  </circle>

  <!-- Migration info box -->
  <rect x="200" y="158" width="100" height="20" rx="4" fill="white" stroke="#E57035" stroke-width="1"/>
  <text x="250" y="172" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">Memory sync</text>

  <!-- Zero Downtime Badge -->
  <rect x="165" y="305" width="170" height="40" rx="20" fill="#E57035"/>
  <text x="250" y="322" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="white">Zero Downtime</text>
  <text x="250" y="337" text-anchor="middle" font-family="system-ui" font-size="8" fill="white" opacity="0.9">Seamless VM Transfer</text>

  <!-- Network indicator -->
  <rect x="140" y="360" width="220" height="24" rx="12" fill="white" stroke="#E57035" stroke-width="1" opacity="0.7"/>
  <circle cx="160" cy="372" r="4" fill="#4CAF50"/>
  <text x="250" y="376" text-anchor="middle" font-family="system-ui" font-size="8" fill="#E57035" opacity="0.7">Network connection active - No service interruption</text>
</svg>