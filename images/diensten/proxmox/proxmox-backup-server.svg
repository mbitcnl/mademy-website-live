<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" rx="20" fill="#FDF2ED"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#E57035">Proxmox Backup Server</text>

  <!-- Source Node 1 -->
  <rect x="20" y="70" width="110" height="80" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <rect x="20" y="70" width="110" height="22" rx="8" fill="#E57035" opacity="0.1"/>
  <text x="75" y="85" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">PVE Node 1</text>
  <rect x="30" y="100" width="40" height="18" rx="3" fill="#E57035" opacity="0.15"/>
  <text x="50" y="113" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="75" y="100" width="40" height="18" rx="3" fill="#E57035" opacity="0.15"/>
  <text x="95" y="113" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="30" y="122" width="40" height="18" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="50" y="134" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">LXC</text>

  <!-- Source Node 2 -->
  <rect x="20" y="170" width="110" height="80" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <rect x="20" y="170" width="110" height="22" rx="8" fill="#E57035" opacity="0.1"/>
  <text x="75" y="185" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">PVE Node 2</text>
  <rect x="30" y="200" width="40" height="18" rx="3" fill="#E57035" opacity="0.15"/>
  <text x="50" y="213" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="75" y="200" width="40" height="18" rx="3" fill="#E57035" opacity="0.25"/>
  <text x="95" y="213" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">LXC</text>

  <!-- Source Node 3 -->
  <rect x="20" y="270" width="110" height="80" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <rect x="20" y="270" width="110" height="22" rx="8" fill="#E57035" opacity="0.1"/>
  <text x="75" y="285" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">PVE Node 3</text>
  <rect x="30" y="300" width="40" height="18" rx="3" fill="#E57035" opacity="0.15"/>
  <text x="50" y="313" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>
  <rect x="75" y="300" width="40" height="18" rx="3" fill="#E57035" opacity="0.15"/>
  <text x="95" y="313" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035">VM</text>

  <!-- Backup arrows -->
  <defs>
    <marker id="bkArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E57035"/>
    </marker>
  </defs>
  <line x1="130" y1="110" x2="240" y2="170" stroke="#E57035" stroke-width="1.5" marker-end="url(#bkArrow)" stroke-dasharray="5,3"/>
  <line x1="130" y1="210" x2="240" y2="200" stroke="#E57035" stroke-width="1.5" marker-end="url(#bkArrow)" stroke-dasharray="5,3"/>
  <line x1="130" y1="310" x2="240" y2="230" stroke="#E57035" stroke-width="1.5" marker-end="url(#bkArrow)" stroke-dasharray="5,3"/>

  <!-- PBS Server -->
  <rect x="245" y="115" width="140" height="180" rx="10" fill="white" stroke="#E57035" stroke-width="2.5"/>
  <rect x="245" y="115" width="140" height="30" rx="10" fill="#E57035" opacity="0.15"/>
  <text x="315" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#E57035">PBS</text>

  <!-- PBS features -->
  <text x="260" y="165" font-family="system-ui" font-size="8" fill="#E57035" opacity="0.8">Incremental backup</text>
  <text x="260" y="182" font-family="system-ui" font-size="8" fill="#E57035" opacity="0.8">Client-side encrypt</text>
  <text x="260" y="199" font-family="system-ui" font-size="8" fill="#E57035" opacity="0.8">Data verification</text>
  <text x="260" y="216" font-family="system-ui" font-size="8" fill="#E57035" opacity="0.8">Prune policies</text>

  <!-- Checkmarks -->
  <text x="252" y="165" font-family="system-ui" font-size="8" fill="#4CAF50">+</text>
  <text x="252" y="182" font-family="system-ui" font-size="8" fill="#4CAF50">+</text>
  <text x="252" y="199" font-family="system-ui" font-size="8" fill="#4CAF50">+</text>
  <text x="252" y="216" font-family="system-ui" font-size="8" fill="#4CAF50">+</text>

  <!-- Progress bar in PBS -->
  <text x="260" y="248" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">Backup progress</text>
  <rect x="260" y="254" width="110" height="8" rx="4" fill="#E57035" opacity="0.1"/>
  <rect x="260" y="254" width="77" height="8" rx="4" fill="#E57035" opacity="0.5"/>
  <text x="260" y="274" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">70% complete</text>

  <!-- Dedup Storage -->
  <rect x="400" y="130" width="80" height="150" rx="8" fill="white" stroke="#E57035" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow to dedup -->
  <line x1="385" y1="200" x2="398" y2="200" stroke="#E57035" stroke-width="1.5" marker-end="url(#bkArrow)"/>

  <!-- Storage icon blocks -->
  <rect x="410" y="145" width="60" height="14" rx="3" fill="#E57035" opacity="0.25"/>
  <rect x="410" y="165" width="60" height="14" rx="3" fill="#E57035" opacity="0.2"/>
  <rect x="410" y="185" width="60" height="14" rx="3" fill="#E57035" opacity="0.15"/>
  <rect x="410" y="205" width="60" height="14" rx="3" fill="#E57035" opacity="0.1"/>
  <rect x="410" y="225" width="60" height="14" rx="3" fill="#E57035" opacity="0.08"/>
  <rect x="410" y="245" width="60" height="14" rx="3" fill="#E57035" opacity="0.05"/>

  <text x="440" y="155" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">Chunk 1</text>
  <text x="440" y="175" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">Chunk 2</text>
  <text x="440" y="195" text-anchor="middle" font-family="system-ui" font-size="6" fill="#E57035">Chunk 3</text>

  <!-- Dedup label -->
  <text x="440" y="286" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#E57035">Dedup</text>
  <text x="440" y="298" text-anchor="middle" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.6">Storage</text>

  <!-- Dedup savings -->
  <rect x="150" y="330" width="200" height="40" rx="8" fill="white" stroke="#E57035" stroke-width="1.5"/>
  <text x="250" y="348" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035">Deduplication ratio</text>
  <text x="250" y="363" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#E57035">3.8x space savings</text>

  <!-- Footer -->
  <text x="250" y="390" text-anchor="middle" font-family="system-ui" font-size="9" fill="#E57035" opacity="0.5">Enterprise Backup with Deduplication</text>
</svg>