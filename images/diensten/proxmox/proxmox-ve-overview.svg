  <text x="155" y="343" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">101</text>
  <text x="185" y="343" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">db-primary</text>
  <circle cx="287" cy="340" r="3" fill="#4CAF50"/>
  <text x="295" y="343" font-family="system-ui" font-size="7" fill="#4CAF50">running</text>
  <text x="340" y="343" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">45%</text>
  <text x="390" y="343" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">8.0 GB</text>

  <text x="155" y="358" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">102</text>
  <text x="185" y="358" font-family="system-ui" font-size="7" fill="#E57035" opacity="0.7">mail-server</text>
